[pytest]

minversion = 7.0

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: unit tests
    integration: integration tests
    slow: slow running tests

asyncio_mode = auto

testpaths = tests

norecursedirs = .git .venv app scripts alembic __pycache__ .pytest_cache
